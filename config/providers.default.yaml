        agents: [claude]
        context: "1M"
      glm-5.1:
        swe_pro: "58.4%"
        lcb_pro: "-"
        hle: "31.0%"
        desc: "通用"
        context: "202.8K"
        wire_apis: [anthropic, completions]
      glm-5:
        swe_pro: "55.1%"
        lcb_pro: "-"
        hle: "30.5%"
        desc: "推理+知识可靠"
        context: "202.8K"
        wire_apis: [anthropic, completions]
      kimi-k2.5:
        swe_pro: "50.7%"
        lcb_pro: "-"
        hle: "30.1%"
        desc: "竞赛编程强"
        context: "262.1K"
        wire_apis: [anthropic, completions]
      MiniMax-M2.5:
        swe_pro: "55.4%"
        lcb_pro: "-"
        hle: "19.4%"
        desc: "SWE-V 80.2%"
        context: "1M"
        wire_apis: [anthropic, completions]
      qwen3-coder-next:
        swe_pro: "-"
        lcb_pro: "-"
        hle: "-"
        desc: "3B激活，性价比极高"
        context: "128K"
        wire_apis: [anthropic, completions]
      deepseek-v4-pro:
        swe_pro: "55.4%"
        lcb_pro: "-"
        hle: "37.7%"
        wire_apis: [completions]
        context: "1M"
      deepseek-v4-flash:
        swe_pro: "52.6%"
        lcb_pro: "-"
        hle: "34.8%"
        wire_apis: [completions]
        context: "1M"
      MiniMax-M2.7:
        swe_pro: "56.2%"
        lcb_pro: "-"
        hle: "28.0%"
        desc: "自我迭代"
        context: "1M"
        wire_apis: [completions]
      deepseek-v3.2:
        swe_pro: "-"
        lcb_pro: "-"
        hle: "25.1%"
        desc: "深度思考"
        context: "131.1K"
        wire_apis: [completions]

  - name: GitHub Copilot Plan

  - name: Packy API
    apikey_source: "keychain:ANTHROPIC_API_KEY"
    endpoints:
      anthropic:
        url: https://www.packyapi.com/
        copilot_auth: bearer_token
    models:
      claude-opus-4-6:
        swe_pro: "57.3%"
        lcb_pro: "-"
        hle: "-"
        desc: "Claude Opus 4.6"
        context: "1M"
      claude-opus-4-7:
        swe_pro: "-"
        lcb_pro: "-"
        hle: "-"
        desc: "Claude Opus 4.7"
        context: "1M"

  - name: Xiaomi MIMO (陈忠润)
    apikey_source: "keychain:MIMO_API_KEY"
    endpoints:
      anthropic:
        url: https://token-plan-cn.xiaomimimo.com/anthropic
        copilot_auth: bearer_token
      completions:
        url: https://token-plan-cn.xiaomimimo.com/v1
    models:
      mimo-v2.5-pro:
        swe_pro: "57.2%"
        lcb_pro: "-"
        hle: "-"
        context: "1M"
      mimo-v2.5:
        swe_pro: "-"
        lcb_pro: "-"
        hle: "-"
        context: "1M"
      mimo-v2.5-tts-voiceclone:
        swe_pro: "-"
        lcb_pro: "-"
        hle: "-"
        context: "262.1K"
      mimo-v2.5-tts-voicedesign:
        swe_pro: "-"
        lcb_pro: "-"
        hle: "-"
        context: "262.1K"
      mimo-v2.5-tts:
        swe_pro: "-"
        lcb_pro: "-"
        hle: "-"
        context: "262.1K"
      mimo-v2-pro:
        swe_pro: "-"
        lcb_pro: "-"
        hle: "-"
        context: "1M"
      mimo-v2-omni:
        swe_pro: "-"
        lcb_pro: "-"
        hle: "-"
        context: "262.1K"
      mimo-v2-tts:
        swe_pro: "-"
        lcb_pro: "-"
        hle: "-"
        context: "262.1K"

agents:
  - id: copilot
    bin: copilot
    wire_apis: [anthropic, responses, completions]
  - id: claude
    bin: claude
    wire_apis: [anthropic]
  - id: codex
    bin: codex
    wire_apis: [responses]
