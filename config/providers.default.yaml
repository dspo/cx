# Default provider configuration baseline for cx.
# Patch or copy this into ~/.config/cx/cx.providers.config.yaml and adjust
# apikey_source to match your local secret backend if needed.

providers:
  - name: 百炼
    apikey_source: "keychain:DASHSCOPE_API_KEY"
    endpoints:
      anthropic:
        url: https://dashscope.aliyuncs.com/apps/anthropic
      responses:
        url: https://dashscope.aliyuncs.com/compatible-mode/v1
      completions:
        url: https://dashscope.aliyuncs.com/compatible-mode/v1
    models:
      qwen3.6-plus:
        swe_pro: "56.6%"
        lcb_pro: "-"
        hle: "28.8%"
        desc: "Agent/终端最强"
        context: "1M"
        wire_apis: [responses]
      qwen3.5-plus:
        swe_pro: "-"
        lcb_pro: "-"
        hle: "-"
        desc: "通用"
        context: "262.1K"
        wire_apis: [responses]
      qwen3-max:
        swe_pro: "-"
        lcb_pro: "-"
        hle: "-"
        desc: "深度推理"
        context: "262.1K"
        wire_apis: [responses]
      qwen3-coder-plus:
        swe_pro: "-"
        lcb_pro: "-"
        hle: "-"
        desc: "编码专用"
        context: "262.1K"
        wire_apis: [responses]
      qwen3-coder-flash:
        swe_pro: "-"
        lcb_pro: "-"
        hle: "-"
        desc: "轻量编码"
        context: "131.1K"
      qwen3.5-flash:
        swe_pro: "-"
        lcb_pro: "-"
        hle: "-"
        desc: "轻量快速"
        context: "1M"
        wire_apis: [responses]
      qwen-plus-latest:
        swe_pro: "-"
        lcb_pro: "-"
        hle: "-"
        desc: "旧版通用"
        context: "128K"
        wire_apis: [responses]
      qwen-turbo-latest:
        swe_pro: "-"
        lcb_pro: "-"
        hle: "-"
        desc: "最轻量"
        context: "128K"
        wire_apis: [responses]
      deepseek-v4-pro[1m]:
        swe_pro: "55.4%"
        lcb_pro: "-"
        hle: "37.7%"
