stages:
  - validate
  - build
  - publish
  - release

default:
  interruptible: true

variables:
  CARGO_TERM_COLOR: always

fmt:
  stage: validate
  image: rust:1.85
  script:
    - cargo fmt --check

test:
  stage: validate
  image: rust:1.85
  script:
    - cargo test

build:linux-x86_64:
  stage: build
  image: rust:1.85
  script:
    - |
      if [ -n "${CI_COMMIT_TAG:-}" ]; then
        export CX_ENFORCE_EMBEDDED_SECRETS=1
      fi
    - cargo build --release
    - mkdir -p dist
    - cp target/release/cx dist/cx-linux-x86_64
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

build:darwin-arm64:
  stage: build
  tags:
    - macos
  rules:
    - if: '$ENABLE_MACOS_RELEASE == "1"'
    - when: never
  script:
    - |
      if [ -n "${CI_COMMIT_TAG:-}" ]; then
        export CX_ENFORCE_EMBEDDED_SECRETS=1
      fi
    - cargo build --release
    - mkdir -p dist
    - cp target/release/cx dist/cx-darwin-arm64
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

publish:release-assets:
  stage: publish
  image: alpine:3.20
  rules:
    - if: '$CI_COMMIT_TAG'
  before_script:
    - apk add --no-cache curl bash coreutils
  script:
    - test -d dist
    - test -n "$(find dist -maxdepth 1 -type f | head -n 1)"
    - test -f dist/cx-linux-x86_64
    - |
      if [ "${ENABLE_MACOS_RELEASE:-0}" = "1" ]; then
        test -f dist/cx-darwin-arm64
      fi
    - VERSION="${CI_COMMIT_TAG#v}"
    - PACKAGE_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/cx/${VERSION}"
    - cp scripts/install-release.sh dist/install.sh
    - chmod +x dist/install.sh
    - |
      if command -v sha256sum >/dev/null 2>&1; then
        (cd dist && sha256sum * > SHA256SUMS)
      else
        (cd dist && shasum -a 256 * > SHA256SUMS)
      fi
    - |
      for file in dist/*; do
        curl --fail --show-error --location \
          --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          --upload-file "${file}" \
          "${PACKAGE_URL}/$(basename "${file}")"
      done
    - |
      links='['
      sep=''
      for file in dist/cx-*; do
        name="$(basename "${file}")"
        url="${PACKAGE_URL}/${name}"
        filepath="/binaries/${name}"
        links="${links}${sep}{\"name\":\"${name}\",\"url\":\"${url}\",\"filepath\":\"${filepath}\",\"link_type\":\"package\"}"
        sep=','
      done
      links="${links}${sep}{\"name\":\"SHA256SUMS\",\"url\":\"${PACKAGE_URL}/SHA256SUMS\",\"filepath\":\"/checksums/SHA256SUMS\",\"link_type\":\"other\"}"
      links="${links}${sep}{\"name\":\"install.sh\",\"url\":\"${PACKAGE_URL}/install.sh\",\"filepath\":\"/install.sh\",\"link_type\":\"other\"}]"
      printf '%s' "${links}" > release-links.json
  artifacts:
    paths:
      - dist/
      - release-links.json
    expire_in: 1 week

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/cli:latest
  rules:
    - if: '$CI_COMMIT_TAG'
  needs:
    - publish:release-assets
  script:
    - : "${GITLAB_RELEASE_TOKEN:?set GITLAB_RELEASE_TOKEN with api scope}"
    - export GITLAB_HOST="${CI_SERVER_HOST}"
    - export GITLAB_TOKEN="${GITLAB_RELEASE_TOKEN}"
    - glab release create "${CI_COMMIT_TAG}" --name "Release ${CI_COMMIT_TAG}" --notes "Internal build ${CI_COMMIT_TAG}" --assets-links "$(cat release-links.json)"

publish:npm:
  stage: publish
  image: node:20-alpine
  rules:
    - if: '$CI_COMMIT_TAG'
  script:
    - VERSION="${CI_COMMIT_TAG#v}"
    - |
      node -e "const fs=require('node:fs'); const path='npm/package.json'; const pkg=JSON.parse(fs.readFileSync(path,'utf8')); pkg.version=process.env.VERSION; fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');"
    - |
      cat > npm/.npmrc <<EOF
      @awesome:registry=https://${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/
      //${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}
      EOF
    - cd npm
    - npm publish
